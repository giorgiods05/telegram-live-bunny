<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #message { color: #fff; font-family: sans-serif; font-size: 18px;
               padding: 20px; line-height: 1.6; text-align: center;
               position: fixed; top: 50%; left: 50%;
               transform: translate(-50%, -50%); }
    #wrapper { display: none; position: fixed;
               top: 0; left: 0; width: 100%; height: 100%; }
    #player { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="message">⏳ Caricamento in corso...</div>
  <div id="wrapper">
    <iframe id="player" allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;fullscreen;" allowfullscreen></iframe>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    async function init() {
      try {
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg.initData })
        });
        if (!res.ok) {
          const err = await res.json();
          document.getElementById('message').innerHTML = err.error === 'Non sei iscritto al canale'
            ? '🔒 Non sei iscritto al canale.'
            : '🔒 Accesso negato.';
          return;
        }
        const { embedUrl } = await res.json();
        document.getElementById('player').src = embedUrl;
        document.getElementById('message').style.display = 'none';
        document.getElementById('wrapper').style.display = 'block';
      } catch (e) {
        document.getElementById('message').innerHTML = '❌ Errore di connessione.';
      }
    }
    init();
  </script>
</body>
</html>
